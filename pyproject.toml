[project]
name = 'assistente-rag-api'
version = '0.1.0'
description = 'Backend FastAPI para Assistente RAG via WhatsApp'
readme = 'README.md'
requires-python = '>=3.11'
dependencies = [
  'alembic>=1.14.0',
  'fastapi>=0.115.0',
  'httpx>=0.28.0',
  'langchain>=0.3.0',
  'langchain-core>=0.3.0',
  'langchain-openai>=0.2.0',
  'langchain-text-splitters>=0.3.0',
  'openai>=1.58.0',
  'pgvector>=0.3.0',
  'psycopg[binary]>=3.2.0',
  'pydantic-settings>=2.6.0',
  'pypdf2>=3.0.1',
  'python-docx>=1.1.2',
  'redis>=5.2.0',
  'sqlalchemy>=2.0.0',
  'structlog>=24.4.0',
  'tenacity>=9.0.0',
  'uvicorn[standard]>=0.32.0',
]

[dependency-groups]
dev = ['mypy>=1.13.0','pytest>=8.3.0','pytest-asyncio>=0.24.0','ruff>=0.8.0']

[tool.pytest.ini_options]
pythonpath = ['.']
testpaths = ['src/tests']
asyncio_mode = 'auto'

[tool.mypy]
python_version = '3.11'
strict = true
warn_unused_configs = true

[tool.ruff]
line-length = 100
target-version = 'py311'

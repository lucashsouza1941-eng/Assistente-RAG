name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, production]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_DB: test_odontobot
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy src/ --ignore-missing-imports
      - name: Run tests
        env:
          TEST_DATABASE_URL: ${{ vars.CI_TEST_DATABASE_URL }}
          TEST_REDIS_URL: ${{ vars.CI_TEST_REDIS_URL }}
          DATABASE_URL: ${{ vars.CI_DATABASE_URL }}
          REDIS_URL: ${{ vars.CI_REDIS_URL }}
          OPENAI_API_KEY: ${{ secrets.CI_OPENAI_API_KEY }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.CI_WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ vars.CI_WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.CI_WHATSAPP_VERIFY_TOKEN }}
          WHATSAPP_APP_SECRET: ${{ secrets.CI_WHATSAPP_APP_SECRET }}
          HASH_SALT: ${{ secrets.CI_HASH_SALT }}
          API_KEY: ${{ secrets.CI_API_KEY }}
          SETTINGS_ENCRYPTION_KEY: ${{ secrets.CI_SETTINGS_ENCRYPTION_KEY }}
          CLINIC_NAME: ${{ vars.CI_CLINIC_NAME }}
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t odontobot-api:test .
      - name: Test health after build
        run: echo "Image built successfully"

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Lint frontend
        run: pnpm lint
        working-directory: .
      - name: Unit tests (Vitest)
        run: pnpm run test:unit
        working-directory: .
      - name: Build Next.js
        env:
          NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ vars.CI_NEXTAUTH_URL }}
          ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD_HASH }}
        run: pnpm build
        working-directory: .
      - name: Start Next.js and run Playwright smoke
        env:
          NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ vars.CI_NEXTAUTH_URL }}
          ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD_HASH }}
          PORT: "3000"
        run: |
          set -e
          pnpm start &
          npx --yes wait-on@7 http://127.0.0.1:3000 --timeout 120000
          pnpm exec playwright install --with-deps
          pnpm run test:e2e:smoke
        working-directory: .

  e2e-critical-paths:
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Build Next.js
        env:
          NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ vars.CI_NEXTAUTH_URL }}
          ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD_HASH }}
        run: pnpm build
        working-directory: .
      - name: Start Next.js and run Playwright critical paths
        env:
          NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ vars.CI_NEXTAUTH_URL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.CI_E2E_ADMIN_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD_HASH }}
          PORT: "3000"
        run: |
          set -e
          pnpm start &
          npx --yes wait-on@7 http://127.0.0.1:3000 --timeout 120000
          pnpm exec playwright install --with-deps
          pnpm run test:e2e:critical
        working-directory: .

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Export locked requirements from uv.lock (pip-audit input)
        run: uv export --frozen --no-dev -o requirements-audit.txt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit and cvss (CVSS scoring for OSV severities)
        run: python -m pip install --upgrade pip pip-audit cvss

      - name: pip-audit — fail only on high/critical (CVSS base ≥ 7.0 via OSV)
        run: python scripts/ci/pip_audit_high_gate.py requirements-audit.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: pnpm audit — fail on high or critical
        run: pnpm audit --audit-level=high
        working-directory: .

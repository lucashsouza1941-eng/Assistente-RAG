name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_DB: test_odontobot
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy src/ --ignore-missing-imports
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/test_odontobot
          TEST_REDIS_URL: redis://localhost:6380/0
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/test_odontobot
          REDIS_URL: redis://localhost:6380/0
          OPENAI_API_KEY: sk-test-fake-key-for-ci
          WHATSAPP_ACCESS_TOKEN: fake-token-for-ci
          WHATSAPP_PHONE_NUMBER_ID: "123456789"
          WHATSAPP_VERIFY_TOKEN: verify-ci
          WHATSAPP_APP_SECRET: fake-secret-for-ci
          HASH_SALT: fake-salt-32-chars-for-ci-only!!
          API_KEY: fake-api-key-for-ci
          SETTINGS_ENCRYPTION_KEY: dKO0Il_vW_x2eWA1zCeUACKBUzKfey_ne5la1BMSLjA=
          CLINIC_NAME: Clínica Teste CI
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t odontobot-api:test .
      - name: Test health after build
        run: echo "Image built successfully"

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Lint frontend
        run: pnpm lint
        working-directory: .
      - name: Build Next.js
        env:
          NEXTAUTH_SECRET: ci-e2e-nextauth-secret-at-least-32-chars
          NEXTAUTH_URL: http://localhost:3000
        run: pnpm build
        working-directory: .
      - name: Start Next.js and run Playwright
        env:
          NEXTAUTH_SECRET: ci-e2e-nextauth-secret-at-least-32-chars
          NEXTAUTH_URL: http://localhost:3000
          PORT: "3000"
        run: |
          set -e
          pnpm start &
          npx --yes wait-on@7 http://127.0.0.1:3000 --timeout 120000
          pnpm exec playwright install --with-deps
          pnpm exec playwright test
        working-directory: .

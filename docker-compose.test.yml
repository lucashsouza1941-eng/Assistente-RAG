# Postgres + Redis para testes de integração (pytest em localhost).
# Portas alinhadas com src/tests/conftest.py (5432 e 6380).
# Não publique portas do serviço `postgres` no docker-compose.yml principal ao mesmo tempo em 5432.

services:
  postgres_test:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_DB: test_odontobot
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d test_odontobot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
